name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Build
        run: go build -o zoho ./cmd/zoho/

      - name: Verify binary
        run: ./zoho --version
